  <script>
    // Auto-reset zoom when fingers are released — keeps layout locked to device width
    // Allows temporary pinch-zoom while fingers are on screen, resets on touchend
    (function () {
      var lastTouchEnd = 0;

      // Reset zoom by briefly enforcing maximum-scale=1, then restoring
      function resetZoom() {
        var meta = document.querySelector('meta[name="viewport"]');
        if (!meta) return;
        var base = 'width=device-width, initial-scale=1.0, viewport-fit=cover';
        meta.setAttribute('content', base + ', maximum-scale=1.0');
        setTimeout(function () {
          meta.setAttribute('content', base);
        }, 300);
      }

      // Reset on touchend when all fingers are lifted
      document.addEventListener('touchend', function (e) {
        if (e.touches.length === 0) {
          resetZoom();
        }
      }, { passive: true });

      // Prevent double-tap zoom (but keep pinch-zoom)
      document.addEventListener('touchend', function (e) {
        var now = Date.now();
        if (now - lastTouchEnd < 300 && e.touches.length === 0) {
          e.preventDefault();
        }
        lastTouchEnd = now;
      }, { passive: false });
    })();
  </script>
