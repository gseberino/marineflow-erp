[functions.quote-reminders]
verify_jwt = false

# ai-agent tem dois caminhos de entrada e faz a própria autenticação em ambos, então o
# gateway não deve exigir JWT: (1) painel — valida o JWT do usuário manualmente via
# sb.auth.getUser e retorna 401 se inválido/ausente; (2) canal WhatsApp (Fase 4) — a
# chamada interna do whatsapp-webhook manda só x-internal-secret, sem Authorization, e é
# validada contra AI_INTERNAL_SECRET. Com verify_jwt=true o gateway barrava a chamada
# interna antes de chegar no código. Sem regressão no painel (a checagem manual continua).
[functions.ai-agent]
verify_jwt = false

# Cron interno (Fase 5): expira pendências vencidas (ai_operator_pending_actions).
# O pg_cron chama só com x-cron-secret (sem Authorization), então o gateway não pode
# exigir JWT. Ação idempotente e interna (só marca 'expired' o que passou de expires_at).
[functions.expire-pending-actions]
verify_jwt = false

# Rotinas proativas da Fase 5 (chamadas pelo pg_cron só com x-cron-secret, sem JWT).
# Cada uma valida o próprio CRON_SECRET internamente.
[functions.ai-daily-briefing]
verify_jwt = false

[functions.ai-whatsapp-followups]
verify_jwt = false

[functions.ai-business-monitor]
verify_jwt = false
