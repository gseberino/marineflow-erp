services:
  evolution-api:
    image: evoapicloud/evolution-api:latest
    container_name: evolution-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      SERVER_PORT: 8080
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@evolution-postgres:5432/${POSTGRES_DB}?schema=public"
      DATABASE_CONNECTION_CLIENT_NAME: evolution_client
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: "redis://evolution-redis:6379/0"
      CACHE_REDIS_PREFIX_KEY: evolution
      CACHE_REDIS_TTL: 604800
    volumes:
      - evolution_instances:/evolution/instances
    depends_on:
      evolution-postgres:
        condition: service_healthy
      evolution-redis:
        condition: service_started
    networks:
      - evolution-net

  evolution-postgres:
    image: postgres:15
    container_name: evolution-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - evolution_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - evolution-net

  evolution-redis:
    image: redis:7-alpine
    container_name: evolution-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - evolution_redis_data:/data
    networks:
      - evolution-net

volumes:
  evolution_pgdata:
    driver: local
  evolution_instances:
    driver: local
  evolution_redis_data:
    driver: local

networks:
  evolution-net:
    driver: bridge
